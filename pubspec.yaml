name: kiosko_v2
description: "Kiosko POS - Self-service kiosk for food ordering"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  flutter_riverpod: ^2.6.1
  intl: ^0.19.0
  drift: ^2.32.1
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.5
  path: ^1.9.1
  image_picker: ^1.2.1
  audioplayers: ^6.6.0
  shared_preferences: ^2.5.5
  crypto: ^3.0.7
  drift_flutter: ^0.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  network_image_mock: ^2.1.1
  integration_test:
    sdk: flutter
  drift_dev: ^2.32.1
  build_runner: ^2.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/products/
    - assets/categories/
